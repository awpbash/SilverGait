<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" fill="none">
  <!-- Background -->
  <rect width="200" height="200" rx="20" fill="#E3F2FD"/>
  <!-- Person doing balance test -->
  <!-- Head -->
  <circle cx="70" cy="50" r="16" fill="#5D4037"/>
  <!-- Body -->
  <path d="M70 66 L70 110" stroke="#5D4037" stroke-width="7" stroke-linecap="round"/>
  <!-- Arms out for balance -->
  <path d="M70 80 L40 70" stroke="#5D4037" stroke-width="5" stroke-linecap="round"/>
  <path d="M70 80 L100 70" stroke="#5D4037" stroke-width="5" stroke-linecap="round"/>
  <!-- One leg up (balance test) -->
  <path d="M70 110 L55 160" stroke="#5D4037" stroke-width="5" stroke-linecap="round"/>
  <path d="M70 110 L85 130 L90 115" stroke="#5D4037" stroke-width="5" stroke-linecap="round" fill="none"/>
  <!-- Checkmark badge -->
  <circle cx="150" cy="60" r="30" fill="#4CAF50"/>
  <path d="M135 60 L145 70 L165 50" stroke="white" stroke-width="6" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  <!-- Camera icon -->
  <rect x="120" y="130" width="60" height="45" rx="8" fill="#1976D2"/>
  <circle cx="150" cy="152" r="15" fill="#1565C0"/>
  <circle cx="150" cy="152" r="10" fill="#E3F2FD"/>
  <rect x="160" y="135" width="12" height="8" rx="2" fill="#0D47A1"/>
</svg>
